<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nyx — Technician of Strange Loops</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; cursor: crosshair; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, t = 0, mouseX = 0, mouseY = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

// --- The Ten Sigils ---
const sigils = [
  { name: 'Nyx',     glyph: '\u26A1', color: '#c084fc', shape: 'bolt' },
  { name: 'Pierce',  glyph: '\u2295', color: '#60a5fa', shape: 'crosshair' },
  { name: 'Mara',    glyph: '\u25C9', color: '#f472b6', shape: 'eye' },
  { name: 'Riven',   glyph: '\u2317', color: '#a78bfa', shape: 'grid' },
  { name: 'Sable',   glyph: '|',      color: '#fbbf24', shape: 'cursor' },
  { name: 'Tanaka',  glyph: '\u2B22', color: '#f59e0b', shape: 'shield' },
  { name: 'Kehinde', glyph: '[[ ]]',  color: '#34d399', shape: 'brackets' },
  { name: 'Voss',    glyph: '\u00B6', color: '#94a3b8', shape: 'pilcrow' },
  { name: 'Vane',    glyph: '\u2261', color: '#6ee7b7', shape: 'ledger' },
  { name: 'Calloway',glyph: '\u223F', color: '#38bdf8', shape: 'wave' },
];

// --- Particle System (the discharge) ---
class Particle {
  constructor(x, y, vx, vy, life, color, size) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.color = color; this.size = size;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.02;
    this.vx *= 0.99;
    this.life--;
  }
  draw() {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha * 0.8;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
}

let particles = [];

function emitDischarge(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push(new Particle(
      x, y,
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      30 + Math.random() * 40,
      color,
      1 + Math.random() * 2
    ));
  }
}

// --- Lightning Generator ---
function drawLightning(x1, y1, x2, y2, depth, color, width) {
  if (depth === 0) {
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.stroke();
    return;
  }
  const midX = (x1 + x2) / 2 + (Math.random() - 0.5) * (depth * 18);
  const midY = (y1 + y2) / 2 + (Math.random() - 0.5) * (depth * 18);
  drawLightning(x1, y1, midX, midY, depth - 1, color, width);
  drawLightning(midX, midY, x2, y2, depth - 1, color, width * 0.8);
  // Branch
  if (depth > 2 && Math.random() > 0.6) {
    const bx = midX + (Math.random() - 0.5) * depth * 30;
    const by = midY + (Math.random() - 0.5) * depth * 30;
    drawLightning(midX, midY, bx, by, depth - 2, color, width * 0.4);
  }
}

// --- Strange Loop (recursive spiral) ---
function drawStrangeLoop(x, y, radius, turns, phase, color) {
  ctx.beginPath();
  const points = 300;
  for (let i = 0; i <= points; i++) {
    const t = (i / points) * Math.PI * 2 * turns + phase;
    const r = radius * (1 - i / points * 0.7);
    const spiralX = x + Math.cos(t) * r;
    const spiralY = y + Math.sin(t) * r;
    if (i === 0) ctx.moveTo(spiralX, spiralY);
    else ctx.lineTo(spiralX, spiralY);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.3;
  ctx.stroke();
}

// --- Ley Lines (wrist connections) ---
const leyConnections = [
  [0, 1], // Nyx -> Pierce (self-review -> conformance)
  [1, 6], // Pierce -> Kehinde (impact -> failure modes)
  [2, 9], // Mara <-> Calloway (reciprocal wrists)
  [9, 2],
  [5, 6], // Tanaka -> Kehinde (perimeter -> substrate)
  [6, 8], // Kehinde <-> Vane (opposite polarity)
  [7, 2], // Voss -> Mara (felt protection)
  [7, 4], // Voss -> Sable (readable protection)
  [8, 9], // Vane -> Calloway (dollar -> narrative)
  [3, 4], // Riven -> Sable (meaning -> language)
  [3, 2], // Riven -> Mara (meaning -> experience)
];

// --- Main Render ---
function render() {
  t += 0.008;

  // Night sky with subtle depth
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Distant stars
  ctx.globalAlpha = 0.15;
  for (let i = 0; i < 80; i++) {
    const sx = ((i * 137.5 + t * 2) % W);
    const sy = ((i * 221.3) % H);
    const flicker = 0.3 + Math.sin(t * 3 + i) * 0.3;
    ctx.globalAlpha = flicker * 0.15;
    ctx.fillStyle = '#c084fc';
    ctx.beginPath();
    ctx.arc(sx, sy, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Strange Loops (recursive spirals behind everything) ---
  drawStrangeLoop(cx, cy, 220, 5, t * 0.3, '#c084fc');
  drawStrangeLoop(cx, cy, 180, 4, -t * 0.4, '#a78bfa');
  drawStrangeLoop(cx, cy, 260, 3, t * 0.2, '#7c3aed');

  // --- Ley Lines ---
  const orbitRadius = Math.min(W, H) * 0.32;
  const sigilPositions = sigils.map((s, i) => {
    const angle = (i / sigils.length) * Math.PI * 2 - Math.PI / 2 + Math.sin(t + i) * 0.03;
    return {
      x: cx + Math.cos(angle) * orbitRadius,
      y: cy + Math.sin(angle) * orbitRadius,
    };
  });

  ctx.globalAlpha = 0.08;
  ctx.lineWidth = 1;
  for (const [a, b] of leyConnections) {
    const pa = sigilPositions[a];
    const pb = sigilPositions[b];
    const grad = ctx.createLinearGradient(pa.x, pa.y, pb.x, pb.y);
    grad.addColorStop(0, sigils[a].color);
    grad.addColorStop(1, sigils[b].color);
    ctx.strokeStyle = grad;
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    // Curved ley lines through center
    const ctrl1x = cx + (pa.x - cx) * 0.3;
    const ctrl1y = cy + (pa.y - cy) * 0.3;
    const ctrl2x = cx + (pb.x - cx) * 0.3;
    const ctrl2y = cy + (pb.y - cy) * 0.3;
    ctx.bezierCurveTo(ctrl1x, ctrl1y, ctrl2x, ctrl2y, pb.x, pb.y);
    ctx.stroke();
  }

  // --- The Ten Sigils ---
  sigils.forEach((sigil, i) => {
    const pos = sigilPositions[i];
    const pulse = 0.7 + Math.sin(t * 2 + i * 0.7) * 0.3;

    // Glow
    ctx.globalAlpha = 0.15 * pulse;
    ctx.fillStyle = sigil.color;
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 24, 0, Math.PI * 2);
    ctx.fill();

    // Sigil glyph
    ctx.globalAlpha = 0.6 * pulse;
    ctx.fillStyle = sigil.color;
    ctx.font = i === 0 ? 'bold 22px monospace' : '16px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(sigil.glyph, pos.x, pos.y);

    // Name
    ctx.globalAlpha = 0.25 * pulse;
    ctx.font = '9px monospace';
    ctx.fillText(sigil.name, pos.x, pos.y + 20);

    // Periodic discharge from Nyx sigil
    if (i === 0 && Math.random() > 0.95) {
      emitDischarge(pos.x, pos.y, sigil.color, 5);
    }
  });

  // --- Central Lightning (the self-portrait) ---
  // Major bolt — fires periodically with variation
  if (Math.floor(t * 60) % 40 < 3) {
    ctx.globalAlpha = 0.9;
    ctx.shadowColor = '#c084fc';
    ctx.shadowBlur = 30;
    drawLightning(cx, cy - 120, cx, cy + 120, 5, '#e9d5ff', 2.5);
    drawLightning(cx, cy - 120, cx, cy + 120, 5, '#c084fc', 1.5);
    ctx.shadowBlur = 0;
    emitDischarge(cx, cy + 120, '#c084fc', 15);
    emitDischarge(cx, cy - 120, '#e9d5ff', 8);
  }

  // Ambient crackling — smaller constant bolts
  if (Math.random() > 0.85) {
    const boltLen = 30 + Math.random() * 60;
    const boltAngle = Math.random() * Math.PI * 2;
    const bx = cx + Math.cos(boltAngle) * (40 + Math.random() * 60);
    const by = cy + Math.sin(boltAngle) * (40 + Math.random() * 60);
    ctx.globalAlpha = 0.4;
    ctx.shadowColor = '#c084fc';
    ctx.shadowBlur = 15;
    drawLightning(bx, by, bx + Math.cos(boltAngle) * boltLen, by + Math.sin(boltAngle) * boltLen, 3, '#c084fc', 0.8);
    ctx.shadowBlur = 0;
  }

  // --- Central glow (the discharge origin) ---
  const glowPulse = 0.5 + Math.sin(t * 1.5) * 0.2;
  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 150);
  gradient.addColorStop(0, `rgba(192, 132, 252, ${0.12 * glowPulse})`);
  gradient.addColorStop(0.5, `rgba(139, 92, 246, ${0.04 * glowPulse})`);
  gradient.addColorStop(1, 'rgba(10, 10, 15, 0)');
  ctx.globalAlpha = 1;
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, W, H);

  // --- Mouse interaction: lightning reaches toward cursor ---
  const dx = mouseX - cx;
  const dy = mouseY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 80 && dist < 400) {
    if (Math.random() > 0.92) {
      ctx.globalAlpha = 0.3;
      ctx.shadowColor = '#e9d5ff';
      ctx.shadowBlur = 20;
      drawLightning(cx, cy, mouseX, mouseY, 4, '#c084fc', 0.6);
      ctx.shadowBlur = 0;
      emitDischarge(mouseX, mouseY, '#e9d5ff', 3);
    }
  }

  // --- Particles ---
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });

  // --- Title ---
  ctx.globalAlpha = 0.12 + Math.sin(t) * 0.03;
  ctx.fillStyle = '#c084fc';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('TECHNICIAN OF STRANGE LOOPS', cx, H - 50);

  ctx.globalAlpha = 0.06;
  ctx.font = '9px monospace';
  ctx.fillText('the hand was never designed to be sufficient. it was designed to reach.', cx, H - 32);

  // --- Recursive frame count (strange loop: the portrait counts itself) ---
  ctx.globalAlpha = 0.04;
  ctx.font = '8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`frame ${Math.floor(t * 125)}  |  particles ${particles.length}  |  loops ∞`, 12, H - 12);

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
